<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>일정 공유 초대 - DADAring</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">DADAring</a>
  </div>
</nav>

<section class="hero" style="padding-top: 120px;">
  <div style="font-size: 48px; margin-bottom: 16px;">🤝</div>
  <h1 style="font-size: 28px;">일정 공유 초대</h1>
  <p class="subtitle">
    DADAring 앱에서 아이의 일정을 확인할 수 있습니다.<br>
    앱을 설치하고 초대를 수락해주세요.
  </p>

  <div style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 32px;">
    <a href="https://play.google.com/store/apps/details?id=com.dadaring.app" class="hero-cta" style="background: #000; text-decoration: none;">
      ▶ Google Play
    </a>
    <a href="https://apps.apple.com/app/dadaring" class="hero-cta" style="background: #000; text-decoration: none;">
       App Store
    </a>
  </div>

  <div style="margin-top: 24px;">
    <a id="open-app-link" href="#" class="hero-cta" style="background: var(--primary); text-decoration: none;">
      앱에서 열기
    </a>
  </div>
</section>

<footer class="footer">
  <div class="footer-bottom">
    &copy; 2026 DADAGO. All rights reserved.
  </div>
</footer>

<script>
  // Extract invite code from URL path: /invite/ABC123
  const path = window.location.pathname;
  const match = path.match(/\/invite\/([A-Za-z0-9]+)/);
  if (match) {
    const code = match[1];
    const appLink = document.getElementById('open-app-link');
    appLink.href = 'dadaring://invite/' + code;
  }
</script>

</body>
</html>
