<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>일정 공유 초대 - DADAring</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <script>
    // Path parsing happens before render so we can rebuild store URLs with
    // the invite code attached as install referrer (Android) / clipboard (iOS).
    (function () {
      var path = window.location.pathname;
      var match = path.match(/\/invite\/([A-Za-z0-9]+)/);
      if (!match) return;  // not an /invite/<code> URL — leave page alone

      var code = match[1].toUpperCase();
      var ua = navigator.userAgent || '';
      var isIOS = /iphone|ipad|ipod/i.test(ua);
      var isAndroid = /android/i.test(ua);
      var playPkg = 'com.dadaring.app';
      var appStoreId = '6769691549';

      // Android: append referrer so Play Install Referrer API delivers the code to the app
      var playUrl = 'https://play.google.com/store/apps/details?id=' + playPkg
                  + '&referrer=' + encodeURIComponent('invite_code=' + code);
      var appleUrl = 'https://apps.apple.com/app/id' + appStoreId;

      // iOS: copy code to clipboard as fallback (read by app on first launch via DeferredInviteService)
      if (isIOS && navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText('dadaring-invite:' + code).catch(function () { /* ignore */ });
      }

      // Expose handles for the rendered buttons below
      window.__dadaring = { code: code, playUrl: playUrl, appleUrl: appleUrl };

      // Note: this page is reached ONLY when the app is not installed (Universal Link /
      // App Link would intercept first if installed). Auto-redirect after a tiny delay
      // gives users a chance to read the headline. If they go back, they see the page.
      if (isIOS || isAndroid) {
        setTimeout(function () {
          window.location.replace(isIOS ? appleUrl : playUrl);
        }, 1500);
      }
    })();
  </script>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">DADAring</a>
  </div>
</nav>

<section class="hero" style="padding-top: 120px;">
  <div style="font-size: 48px; margin-bottom: 16px;">🤝</div>
  <h1 style="font-size: 28px;">일정 공유 초대</h1>
  <p class="subtitle">
    다다링 앱에서 아이의 일정을 확인할 수 있습니다.<br>
    앱을 설치하면 초대가 자동으로 적용됩니다.
  </p>

  <div style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 32px;">
    <a id="play-store-link" href="https://play.google.com/store/apps/details?id=com.dadaring.app" class="hero-cta" style="background: #000; text-decoration: none;">
      🤖 Google Play
    </a>
    <a id="app-store-link" href="https://apps.apple.com/app/id6769691549" class="hero-cta" style="background: #000; text-decoration: none;">
      🍎 App Store
    </a>
  </div>

  <div style="margin-top: 24px;">
    <a id="open-app-link" href="#" class="hero-cta" style="background: var(--primary); text-decoration: none;">
      앱에서 열기
    </a>
  </div>
</section>

<footer class="footer">
  <div class="footer-bottom">
    &copy; 2026 DADAGO. All rights reserved.
  </div>
</footer>

<script>
  // Wire up rendered links with code-aware URLs from the IIFE above.
  if (window.__dadaring) {
    var d = window.__dadaring;
    document.getElementById('open-app-link').href = 'dadaring://invite/' + d.code;
    document.getElementById('play-store-link').href = d.playUrl;
    document.getElementById('app-store-link').href = d.appleUrl;
  }
</script>

</body>
</html>
