name: Deploy dadaring-web

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Sync to S3
        run: aws s3 sync . s3://dadaring-web-prod --exclude ".git/*" --exclude ".github/*" --exclude "*.md" --exclude "cloudfront-*.json" --exclude "cloudfront-routing-function.js" --delete

      - name: Fix apple-app-site-association content-type
        # Apple requires application/json. S3 defaults to application/octet-stream
        # for extension-less files. Re-upload with explicit metadata.
        run: |
          aws s3 cp .well-known/apple-app-site-association \
            s3://dadaring-web-prod/.well-known/apple-app-site-association \
            --content-type "application/json" \
            --metadata-directive REPLACE

      - name: Invalidate CloudFront cache
        env:
          DISTRIBUTION_ID: E1LHYXQO70K3I1
        run: aws cloudfront create-invalidation --distribution-id "$DISTRIBUTION_ID" --paths "/*"
