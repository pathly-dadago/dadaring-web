<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>관리자 - DADAring</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <style>
    :root{--green:#43C67A;--greenD:#35A866;--surface:#EAF8F0;--appbg:#F5FFF9;
      --card:#fff;--tp:#2D3436;--ts:#8E9AAB;--divider:#D8F0E3;--red:#E85D4A;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Pretendard Variable',Pretendard,sans-serif;background:var(--appbg);color:var(--tp);}
    button{font-family:inherit;cursor:pointer;}
    .hidden{display:none!important;}
    #login{min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .login-card{background:var(--card);border:1px solid var(--divider);border-radius:16px;
      padding:32px;width:340px;box-shadow:0 8px 30px rgba(31,51,41,.08);}
    .login-card h1{color:var(--greenD);font-size:20px;margin-bottom:20px;}
    .login-card input{width:100%;border:1px solid var(--divider);border-radius:10px;
      padding:11px 13px;font-size:14px;margin-bottom:10px;}
    .login-card button{width:100%;background:var(--green);color:#fff;border:0;
      border-radius:10px;padding:12px;font-size:15px;font-weight:700;}
    .err{color:var(--red);font-size:12.5px;margin-top:8px;min-height:16px;}
    #shell{display:flex;min-height:100vh;}
    .side{width:200px;background:var(--card);border-right:1px solid var(--divider);
      padding:20px 12px;display:flex;flex-direction:column;flex-shrink:0;}
    .brand{font-weight:800;color:var(--greenD);font-size:16px;padding:0 8px 18px;}
    .menu{border:0;background:var(--surface);color:var(--greenD);font-weight:700;
      border-radius:10px;padding:10px 12px;font-size:14px;text-align:left;}
    .menu .cnt{float:right;background:var(--red);color:#fff;border-radius:9px;
      padding:0 7px;font-size:11px;line-height:18px;}
    .menu+.menu{margin-top:6px;}
    .menu.off{background:none;color:var(--ts);font-weight:600;}
    .side-foot{margin-top:auto;border-top:1px solid var(--divider);padding:12px 8px 0;font-size:12px;color:var(--ts);}
    .side-foot button{background:none;border:0;color:var(--red);font-size:12px;padding:4px 0;}
    .content{flex:1;display:flex;min-width:0;}
    .list{width:360px;border-right:1px solid var(--divider);padding:16px;overflow-y:auto;
      height:100vh;flex-shrink:0;}
    .chips{display:flex;gap:6px;margin-bottom:12px;}
    .chip{border:1px solid var(--divider);background:var(--card);border-radius:14px;
      padding:4px 12px;font-size:12.5px;color:var(--ts);}
    .chip.on{background:var(--green);border-color:var(--green);color:#fff;font-weight:700;}
    .fb{background:var(--card);border:1px solid var(--divider);border-radius:12px;
      padding:12px;margin-bottom:8px;cursor:pointer;}
    .fb.sel{border:2px solid var(--green);padding:11px;}
    .fb .top{display:flex;justify-content:space-between;font-size:11px;margin-bottom:5px;}
    .fb .top .st-new{color:var(--red);font-weight:800;}
    .fb .top .st-replied{color:var(--greenD);font-weight:700;}
    .fb .top .dt{color:var(--ts);}
    .fb .msg{font-size:13px;color:var(--tp);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .detail{flex:1;padding:20px;overflow-y:auto;height:100vh;}
    .dcard{background:var(--card);border:1px solid var(--divider);border-radius:14px;padding:20px;max-width:720px;}
    .dmeta{font-size:12px;color:var(--ts);margin-bottom:12px;}
    .dmsg{font-size:14.5px;line-height:1.65;white-space:pre-wrap;margin-bottom:18px;}
    .rep-h{font-size:12.5px;font-weight:800;color:var(--greenD);border-top:1px dashed var(--divider);padding-top:14px;margin-bottom:8px;}
    .rep{background:var(--surface);border-radius:10px;padding:10px 12px;font-size:13px;margin-bottom:6px;white-space:pre-wrap;}
    .rep .rdt{display:block;font-size:11px;color:var(--ts);margin-top:4px;}
    textarea{width:100%;border:1px solid var(--divider);border-radius:10px;padding:10px 12px;
      font-size:13.5px;font-family:inherit;resize:vertical;margin-top:10px;}
    .send{margin-top:8px;background:var(--green);color:#fff;border:0;border-radius:10px;
      padding:10px 18px;font-size:13.5px;font-weight:700;float:right;}
    .send:disabled{opacity:.5;}
    .empty{color:var(--ts);font-size:14px;padding:60px 20px;text-align:center;}
    /* ── 통계 뷰 ── */
    #viewFeedback{display:flex;flex:1;min-width:0;}
    #viewStats{flex:1;height:100vh;overflow-y:auto;padding:18px 22px;}
    .ctl-gap{width:12px;}
    .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;
      margin:14px 0;max-width:860px;}
    .kpi{background:var(--card);border:1px solid var(--divider);border-radius:12px;padding:12px 14px;}
    .kpi .kl{font-size:12px;color:var(--ts);}
    .kpi .kv{font-size:21px;font-weight:800;margin-top:2px;}
    .kpi .ks{font-size:11.5px;color:var(--ts);margin-top:2px;}
    .scard{background:var(--card);border:1px solid var(--divider);border-radius:14px;
      padding:16px;margin-bottom:14px;max-width:860px;}
    .scard h2{font-size:14px;margin-bottom:10px;}
    .scard svg{width:100%;height:auto;display:block;}
    .scard svg text{font-size:9px;fill:var(--ts);font-family:inherit;}
    .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11.5px;color:var(--ts);margin-top:6px;}
    .legend i{display:inline-block;width:10px;height:10px;border-radius:2px;
      margin-right:4px;vertical-align:-1px;}
    .tier{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:14px;}
    .tier th{font-size:11.5px;color:var(--ts);font-weight:700;text-align:left;
      padding:6px 8px;border-bottom:1px solid var(--divider);}
    .tier td{padding:7px 8px;border-bottom:1px solid var(--divider);}
    .tier th:nth-child(n+3),.tier td:nth-child(n+3){text-align:right;}
    .tier td.over{color:var(--red);font-weight:700;}
    .feat{margin-bottom:10px;}
    .feat .fl{font-size:12.5px;margin-bottom:4px;}
    .feat .ftrack{background:var(--surface);border-radius:6px;height:10px;overflow:hidden;}
    .feat .ffill{background:var(--green);height:100%;border-radius:6px;}
    /* ── 모바일 반응형 (≤768px): 사이드바→상단 바, 패널 세로 스택 ── */
    @media (max-width: 768px) {
      #shell{flex-direction:column;min-height:100vh;}
      .side{width:100%;flex-direction:row;align-items:center;gap:8px;
        padding:10px 12px;border-right:0;border-bottom:1px solid var(--divider);}
      .brand{padding:0;font-size:14px;white-space:nowrap;}
      .menu{padding:7px 10px;font-size:12.5px;white-space:nowrap;}
      .side-foot{margin-top:0;margin-left:auto;border-top:0;padding:0;
        text-align:right;font-size:11px;}
      .side-foot span{display:none;} /* 좁은 화면 — 이메일 생략, 로그아웃만 */
      .content{flex-direction:column;}
      .list{width:100%;height:auto;max-height:none;overflow:visible;border-right:0;
        border-bottom:0;padding:12px;}
      .detail{display:none;} /* 모바일은 리스트 안 인라인(아코디언)으로 */
      .fb-inline{margin:-2px 0 10px;}
      .fb-inline .dcard{border-top-left-radius:0;border-top-right-radius:0;
        border-top:0;max-width:none;}
      .fb.sel{border-bottom-left-radius:0;border-bottom-right-radius:0;}
      .dcard{padding:14px;}
      /* 통계 */
      .scard{padding:12px;}
      .tier{display:block;overflow-x:auto;white-space:nowrap;font-size:12px;}
      .send{width:100%;float:none;}
      textarea{font-size:16px;} /* iOS 자동 줌 방지 */
      .login-card{width:92vw;max-width:340px;}
    }
  </style>
</head>
<body>

<div id="login">
  <form class="login-card" onsubmit="return doLogin(event)">
    <h1>DADAring 관리자</h1>
    <input id="email" type="email" placeholder="관리자 이메일" autocomplete="username" required>
    <input id="pw" type="password" placeholder="비밀번호" autocomplete="current-password" required>
    <button type="submit">로그인</button>
    <div class="err" id="loginErr"></div>
  </form>
</div>

<div id="shell" class="hidden">
  <nav class="side">
    <div class="brand">DADAring 관리자</div>
    <button class="menu" id="menuStats" onclick="showView('stats')">📊 대시보드</button>
    <button class="menu off" id="menuFeedback" onclick="showView('feedback')">💬 피드백 <span class="cnt" id="newCnt"></span></button>
    <div class="side-foot"><span id="who"></span><br><button onclick="logout()">로그아웃</button></div>
  </nav>
  <main class="content">
    <div id="viewFeedback">
      <section class="list">
        <div class="chips">
          <button class="chip on" data-f="all" onclick="setFilter('all')">전체</button>
          <button class="chip" data-f="new" onclick="setFilter('new')">신규</button>
          <button class="chip" data-f="replied" onclick="setFilter('replied')">답변완료</button>
        </div>
        <div id="items"></div>
      </section>
      <section class="detail" id="detail"><div class="empty">왼쪽에서 피드백을 선택하세요</div></section>
    </div>
    <div id="viewStats" class="hidden">
      <div class="chips" id="statsCtl">
        <button class="chip" data-p="30" onclick="setStatsPeriod('30')">30일</button>
        <button class="chip on" data-p="90" onclick="setStatsPeriod('90')">90일</button>
        <button class="chip" data-p="all" onclick="setStatsPeriod('all')">전체</button>
        <span class="ctl-gap"></span>
        <button class="chip on" data-u="day" onclick="setStatsUnit('day')">일</button>
        <button class="chip" data-u="week" onclick="setStatsUnit('week')">주</button>
        <button class="chip" data-u="month" onclick="setStatsUnit('month')">월</button>
      </div>
      <div id="statsBody"></div>
    </div>
  </main>
</div>

<script>
const DEV = new URLSearchParams(location.search).get('env') === 'dev';
const API = DEV ? 'https://c5gye4ook6.execute-api.ap-northeast-2.amazonaws.com/dev'
               : 'https://dnbl3bo4eg.execute-api.ap-northeast-2.amazonaws.com/prod';
const CLIENT_ID = DEV ? '29ge20drb8s709amr04u54pbv8' : '289jkoj217r2u661mfe5jf9avs';
const COGNITO = 'https://cognito-idp.ap-northeast-2.amazonaws.com/';

let feedbacks = [], filter = 'all', selectedId = null;

const token = () => sessionStorage.getItem('adminIdToken');

async function doLogin(e) {
  e.preventDefault();
  const err = document.getElementById('loginErr');
  err.textContent = '';
  try {
    const res = await fetch(COGNITO, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-amz-json-1.1',
                 'X-Amz-Target': 'AWSCognitoIdentityProviderService.InitiateAuth' },
      body: JSON.stringify({
        AuthFlow: 'USER_PASSWORD_AUTH', ClientId: CLIENT_ID,
        AuthParameters: { USERNAME: document.getElementById('email').value.trim(),
                          PASSWORD: document.getElementById('pw').value } }),
    });
    const data = await res.json();
    if (!res.ok || !data.AuthenticationResult) {
      err.textContent = '로그인에 실패했어요. 이메일/비밀번호를 확인해 주세요';
      return false;
    }
    sessionStorage.setItem('adminIdToken', data.AuthenticationResult.IdToken);
    sessionStorage.setItem('adminEmail', document.getElementById('email').value.trim());
    await enter();
  } catch (_) { err.textContent = '네트워크 오류 — 잠시 후 다시 시도해 주세요'; }
  return false;
}

function logout() { sessionStorage.clear(); location.reload(); }

async function api(path, opts = {}) {
  const res = await fetch(API + path, { ...opts,
    headers: { 'Content-Type': 'application/json',
               // 앱과 동일하게 raw 토큰 — API GW Cognito authorizer 는 Bearer 접두어를 못 읽는다
               'Authorization': token(), ...(opts.headers || {}) } });
  if (!res.ok) { const e = new Error('요청 실패 ' + res.status); e.status = res.status; throw e; }
  return res.json();
}

async function load() {
  const data = await api('/feedback/admin');
  feedbacks = data.feedbacks || [];
  renderList();
  const n = feedbacks.filter(f => f.status === 'new').length;
  document.getElementById('newCnt').textContent = n || '';
}

/// 로그인/재방문 시 관리자 검사 겸 첫 로드 — 통과해야만 셸을 보여준다.
async function verifyAndLoad() {
  try {
    await load();
    return true;
  } catch (e) {
    sessionStorage.clear();
    const err = document.getElementById('loginErr');
    err.textContent = e.status === 403 ? '관리자 계정이 아니에요'
        : e.status === 401 ? '세션이 만료됐어요. 다시 로그인해 주세요'
        : '목록을 불러오지 못했어요. 잠시 후 다시 시도해 주세요';
    document.getElementById('shell').classList.add('hidden');
    document.getElementById('login').classList.remove('hidden');
    return false;
  }
}

function setFilter(f) {
  filter = f;
  document.querySelectorAll('#viewFeedback .chip').forEach(c => c.classList.toggle('on', c.dataset.f === f));
  renderList();
}

// XSS 방어: 피드백 본문 등 사용자 입력은 반드시 esc() 를 거쳐 innerHTML 에 넣는다.
// (따옴표까지 이스케이프 — 속성 컨텍스트에 실수로 들어가도 안전하게)
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
const fmt = iso => iso ? iso.slice(0, 16).replace('T', ' ') : '';

const isMobile = () => matchMedia('(max-width:768px)').matches;

function detailHtml(f) {
  return `
    <div class="dcard">
      <div class="dmeta">${esc(f.ownerEmail)}${f.client ? ' · ' + esc(f.client) : ''} · ${fmt(f.createdAt)}</div>
      <div class="dmsg">${esc(f.message)}</div>
      <div class="rep-h">💬 답글 이력 (${f.replies.length})</div>
      ${f.replies.map(r => `<div class="rep">${esc(r.message)}<span class="rdt">${fmt(r.createdAt)}</span></div>`).join('')}
      <textarea id="replyText" rows="4" placeholder="답글을 입력하면 사용자 앱 알림으로 전송돼요"></textarea>
      <button class="send" id="sendBtn" onclick="sendReply('${f.feedbackId}')">답글 저장 + 앱 알림 보내기</button>
    </div>`;
}

function renderList() {
  const box = document.getElementById('items');
  const shown = feedbacks.filter(f => filter === 'all' || f.status === filter);
  if (!shown.length) { box.innerHTML = '<div class="empty">피드백이 없어요</div>'; return; }
  box.innerHTML = shown.map(f => `
    <div class="fb ${f.feedbackId === selectedId ? 'sel' : ''}" onclick="select('${f.feedbackId}')">
      <div class="top">
        <span class="${f.status === 'new' ? 'st-new' : 'st-replied'}">
          ${f.status === 'new' ? '● 신규' : '✓ 답변완료'}</span>
        <span class="dt">${fmt(f.createdAt)}</span>
      </div>
      <div class="msg">${esc(f.message)}</div>
    </div>
    ${isMobile() && f.feedbackId === selectedId
        ? `<div class="fb-inline">${detailHtml(f)}</div>` : ''}`).join('');
}

function select(id) {
  // 모바일 아코디언 — 같은 항목 다시 누르면 접힘
  selectedId = (isMobile() && selectedId === id) ? null : id;
  renderList();
  const f = feedbacks.find(x => x.feedbackId === selectedId);
  if (isMobile()) return; // 모바일은 renderList 가 인라인으로 그림
  document.getElementById('detail').innerHTML = f
      ? detailHtml(f)
      : '<div class="empty">왼쪽에서 피드백을 선택하세요</div>';
}

async function sendReply(id) {
  const ta = document.getElementById('replyText');
  const msg = ta.value.trim();
  if (!msg) { ta.focus(); return; }
  const btn = document.getElementById('sendBtn');
  btn.disabled = true; btn.textContent = '보내는 중…';
  try {
    const data = await api(`/feedback/admin/${id}/reply`, {
      method: 'POST', body: JSON.stringify({ message: msg }) });
    const i = feedbacks.findIndex(f => f.feedbackId === id);
    if (i >= 0) feedbacks[i] = data.feedback;
    renderList(); select(id);
    document.getElementById('newCnt').textContent =
      feedbacks.filter(f => f.status === 'new').length || '';
  } catch (e) {
    btn.disabled = false; btn.textContent = '답글 저장 + 앱 알림 보내기';
    if (e.status === 401) { alert('세션이 만료됐어요. 다시 로그인해 주세요'); logout(); return; }
    alert('전송에 실패했어요: ' + e.message);
  }
}

/* ── 📊 통계 뷰 ─────────────────────────────────────────────
   서버는 일별 배열만 주고(기본 90일, '전체'만 재호출) 기간·단위(일/주/월)
   재계산은 전부 클라이언트. 활성의 주/월 값은 distinct 합산이 불가하므로
   버켓 내 최대 DAU('최대 일활성')로 표기한다. */
let currentView = 'feedback';
let statsPeriod = '90', statsUnit = 'day';
const statsCache = {};   // 'd90' | 'all' → GET /feedback/admin/stats 응답

function showView(v) {
  currentView = v;
  document.getElementById('viewFeedback').classList.toggle('hidden', v !== 'feedback');
  document.getElementById('viewStats').classList.toggle('hidden', v !== 'stats');
  document.getElementById('menuFeedback').classList.toggle('off', v !== 'feedback');
  document.getElementById('menuStats').classList.toggle('off', v !== 'stats');
  if (v === 'stats') loadStats();
}

const todayKST = () => new Date(Date.now() + 9 * 3600 * 1000).toISOString().slice(0, 10);
const daysBefore = (day, n) =>
  new Date(new Date(day + 'T00:00:00Z').getTime() - n * 86400000).toISOString().slice(0, 10);

async function loadStats() {
  const key = statsPeriod === 'all' ? 'all' : 'd90';
  if (!statsCache[key]) {
    const body = document.getElementById('statsBody');
    body.innerHTML = '<div class="empty">통계를 불러오는 중…</div>';
    try {
      statsCache[key] = await api(key === 'all'
        ? `/feedback/admin/stats?start=2026-01-01&end=${todayKST()}`
        : '/feedback/admin/stats');
    } catch (e) {
      if (e.status === 401) { alert('세션이 만료됐어요. 다시 로그인해 주세요'); logout(); return; }
      body.innerHTML = '<div class="empty">통계를 불러오지 못했어요 (' + esc(e.message) + ')</div>';
      return;
    }
  }
  renderStats();
}

function setStatsPeriod(p) { statsPeriod = p; syncStatsChips(); loadStats(); }
function setStatsUnit(u) { statsUnit = u; syncStatsChips(); renderStats(); }
function syncStatsChips() {
  document.querySelectorAll('#statsCtl [data-p]').forEach(c =>
    c.classList.toggle('on', c.dataset.p === statsPeriod));
  document.querySelectorAll('#statsCtl [data-u]').forEach(c =>
    c.classList.toggle('on', c.dataset.u === statsUnit));
}

const fmtInt = n => Math.round(Number(n) || 0).toLocaleString('ko-KR');
const fmtTok = n => { n = Number(n) || 0;
  return n >= 1e6 ? (n / 1e6).toFixed(1) + 'M' : n >= 1000 ? Math.round(n / 1000) + 'K' : String(n); };

// 일별 배열 → 단위 버켓 (week=월요일 시작일 키, month=YYYY-MM). fold 가 합산/최대 결정.
function bucketKey(date, unit) {
  if (unit === 'month') return date.slice(0, 7);
  if (unit === 'week') {
    const d = new Date(date + 'T00:00:00Z');
    d.setUTCDate(d.getUTCDate() - (d.getUTCDay() + 6) % 7);
    return d.toISOString().slice(0, 10);
  }
  return date;
}
function bucket(daily, unit, fold) {
  const m = new Map();
  for (const r of daily || []) {
    if (!r || !r.date) continue;
    m.set(bucketKey(r.date, unit), fold(m.get(bucketKey(r.date, unit)), r));
  }
  return [...m.keys()].sort().map(k => ({ date: k, ...m.get(k) }));
}

/* ── SVG 차트 (외부 lib 불가 — 직접 렌더). 공통 좌표계 + y눈금 3개 + x라벨 4~6개 ── */
const CG = { w: 420, h: 180, l: 46, r: 46, t: 12, b: 26 };
const plotW = CG.w - CG.l - CG.r, plotH = CG.h - CG.t - CG.b;
const xc = (i, n) => CG.l + plotW * (i + 0.5) / Math.max(n, 1);
const yc = (v, max) => CG.t + plotH - (max > 0 ? plotH * v / max : 0);
const EMPTY_CHART = '<div class="empty">아직 데이터가 없어요</div>';

function niceCeil(v) {
  if (!(v > 0)) return 1;
  const p = Math.pow(10, Math.floor(Math.log10(v)));
  for (const s of [1, 2, 2.5, 5, 10]) if (s * p >= v) return s * p;
  return 10 * p;
}
const niceCeilInt = v => Math.max(2, Math.ceil(niceCeil(v) / 2) * 2); // ½ 눈금도 정수가 되게

function gridSvg(maxL, fmtL, maxR, fmtR) { // 눈금 0·½·최대 + 가로 그리드 (+우축)
  let g = '';
  for (const f of [0, 0.5, 1]) {
    const y = yc(maxL * f, maxL);
    g += `<line x1="${CG.l}" y1="${y}" x2="${CG.w - CG.r}" y2="${y}" stroke="#D8F0E3"/>`
       + `<text x="${CG.l - 6}" y="${y + 3}" text-anchor="end">${fmtL(maxL * f)}</text>`;
    if (maxR != null)
      g += `<text x="${CG.w - CG.r + 6}" y="${y + 3}">${fmtR(maxR * f)}</text>`;
  }
  return g;
}
function xLabelsSvg(rows) {
  const n = rows.length, step = Math.max(1, Math.ceil(n / 5)); // 최대 5~6개 라벨
  let g = '';
  for (let i = 0; i < n; i += step)
    g += `<text x="${xc(i, n)}" y="${CG.h - 8}" text-anchor="middle">${xfmt(rows[i].date)}</text>`;
  return g;
}
const xfmt = d => statsUnit === 'month'
  ? `${d.slice(2, 4)}.${+d.slice(5, 7)}` : `${+d.slice(5, 7)}/${+d.slice(8, 10)}`;
const svgOpen = () => `<svg viewBox="0 0 ${CG.w} ${CG.h}" xmlns="http://www.w3.org/2000/svg">`;

// 가입: 신규 막대(좌축) + 누적 선(우축)
function barLineChart(rows, barKey, lineKey) {
  if (!rows.length) return EMPTY_CHART;
  const maxB = niceCeilInt(Math.max(...rows.map(r => r[barKey] || 0)));
  const maxL = niceCeilInt(Math.max(...rows.map(r => r[lineKey] || 0)));
  const n = rows.length, bw = Math.min(26, plotW / n * 0.62);
  let s = svgOpen() + gridSvg(maxB, fmtInt, maxL, fmtInt);
  rows.forEach((r, i) => {
    const y = yc(r[barKey] || 0, maxB);
    s += `<rect x="${xc(i, n) - bw / 2}" y="${y}" width="${bw}" height="${Math.max(0, CG.t + plotH - y)}" rx="1.5" fill="#7FD6A4"/>`;
  });
  s += `<polyline fill="none" stroke="#35A866" stroke-width="1.8" points="${
    rows.map((r, i) => `${xc(i, n)},${yc(r[lineKey] || 0, maxL)}`).join(' ')}"/>`;
  return s + xLabelsSvg(rows) + '</svg>';
}

// 활성: 접속 실선 + AI 점선
function twoLineChart(rows, k1, k2) {
  if (!rows.length) return EMPTY_CHART;
  const max = niceCeilInt(Math.max(...rows.map(r => Math.max(r[k1] || 0, r[k2] || 0))));
  const n = rows.length;
  const pts = k => rows.map((r, i) => `${xc(i, n)},${yc(r[k] || 0, max)}`).join(' ');
  const dots = (k, color) => n > 15 ? '' : rows.map((r, i) =>
    `<circle cx="${xc(i, n)}" cy="${yc(r[k] || 0, max)}" r="2" fill="${color}"/>`).join('');
  return svgOpen() + gridSvg(max, fmtInt)
    + `<polyline fill="none" stroke="#35A866" stroke-width="1.8" points="${pts(k1)}"/>`
    + `<polyline fill="none" stroke="#43C67A" stroke-width="1.6" stroke-dasharray="4 3" points="${pts(k2)}"/>`
    + dots(k1, '#35A866') + dots(k2, '#43C67A')
    + xLabelsSvg(rows) + '</svg>';
}

// 토큰: 티어별 누적 막대 (패밀리+프리미엄 합산 3색)
const TIER_SEGS = [
  { key: 'free',       label: '무료',            color: '#D9F2E3' },
  { key: 'individual', label: '개인',            color: '#7FD6A4' },
  { key: 'fp',         label: '패밀리+프리미엄',  color: '#35A866' },
];
const segVal = (r, k) => k === 'fp'
  ? (Number(r.byTier?.family) || 0) + (Number(r.byTier?.premium) || 0)
  : (Number(r.byTier?.[k]) || 0);

function stackedBarChart(rows) {
  if (!rows.length) return EMPTY_CHART;
  const max = niceCeil(Math.max(...rows.map(r => TIER_SEGS.reduce((a, s) => a + segVal(r, s.key), 0))));
  const n = rows.length, bw = Math.min(26, plotW / n * 0.62);
  let s = svgOpen() + gridSvg(max, fmtTok);
  rows.forEach((r, i) => {
    let acc = 0;
    for (const seg of TIER_SEGS) {
      const v = segVal(r, seg.key);
      if (!v) continue;
      const y0 = yc(acc, max), y1 = yc(acc + v, max);
      s += `<rect x="${xc(i, n) - bw / 2}" y="${y1}" width="${bw}" height="${Math.max(0.5, y0 - y1)}" fill="${seg.color}"/>`;
      acc += v;
    }
  });
  return s + xLabelsSvg(rows) + '</svg>';
}

const FEATURE_NAMES = { notice: '📋 알림장', diary: '📔 일기', ar: '📚 AR 독서',
                        todo: '✅ 할일 AI', tuition: '💰 학원비' };
const TIER_NAMES = { free: '무료', individual: '개인', family: '패밀리', premium: '프리미엄' };
const UNIT_LABEL = { day: '일별', week: '주별', month: '월별' };

function renderStats() {
  const data = statsCache[statsPeriod === 'all' ? 'all' : 'd90'];
  if (!data) return;
  const end = todayKST();
  const cutoff = statsPeriod === '30' ? daysBefore(end, 29)
               : statsPeriod === '90' ? daysBefore(end, 89) : '';
  const inRange = rows => (rows || []).filter(r => r && r.date >= cutoff);
  const signupDaily = inRange(data.signups?.daily);
  const activeDaily = inRange(data.active?.daily);
  const tokenDaily = inRange(data.tokens?.daily);
  const periodDays = statsPeriod === 'all'
    ? Math.max(1, Math.round((new Date(end) - new Date('2026-01-01')) / 86400000) + 1)
    : Number(statsPeriod);

  // 버켓: 가입·토큰=합산, 활성=버켓 내 최대값(최대 일활성)
  const suRows = bucket(signupDaily, statsUnit,
    (a, r) => ({ count: (a?.count || 0) + (Number(r.count) || 0) }));
  const acRows = bucket(activeDaily, statsUnit, (a, r) => ({
    app: Math.max(a?.app || 0, Number(r.app) || 0), ai: Math.max(a?.ai || 0, Number(r.ai) || 0) }));
  const tkRows = bucket(tokenDaily, statsUnit, (a, r) => {
    const o = a || { total: 0, byTier: {} };
    o.total += Number(r.total) || 0;
    for (const [t, v] of Object.entries(r.byTier || {}))
      o.byTier[t] = (o.byTier[t] || 0) + (Number(v) || 0);
    return o;
  });

  // 누적 가입 선 = (총 가입자 - 기간 신규) + 러닝합
  const total = Number(data.signups?.total) || 0;
  const newInPeriod = suRows.reduce((a, r) => a + r.count, 0);
  let run = total - newInPeriod;
  const suRows2 = suRows.map(r => ({ ...r, cum: (run += r.count) }));

  // 티어별 토큰은 기간 내 daily 재합산 (서버 byTier.tokens 는 조회 구간 전체)
  const tierTok = {};
  for (const r of tokenDaily)
    for (const [t, v] of Object.entries(r.byTier || {}))
      tierTok[t] = (tierTok[t] || 0) + (Number(v) || 0);

  const a = data.active || {};
  const kpi = (label, val, sub) => `<div class="kpi"><div class="kl">${label}</div>` +
    `<div class="kv">${val}</div><div class="ks">${sub}</div></div>`;
  const kpis =
      kpi('총 가입자', fmtInt(total), `기간 신규 +${fmtInt(newInPeriod)}`)
    + kpi('DAU (오늘)', fmtInt(a.dauToday), `AI 활성 ${fmtInt(a.aiDauToday)}`)
    + kpi('WAU (7일)', fmtInt(a.wau), `AI 활성 ${fmtInt(a.aiWau)}`)
    + kpi('MAU (30일)', fmtInt(a.mau), `AI 활성 ${fmtInt(a.aiMau)}`);

  // 티어 표 — 평균 월환산 = tokens/(free·개인: users, 패밀리·프리미엄: subs)/기간일수×30
  const caps = data.caps || {};
  const byTier = data.tokens?.byTier || {};
  const tierRows = ['free', 'individual', 'family', 'premium'].map(t => {
    const info = byTier[t] || {};
    const users = Number(info.users) || 0, subs = Number(info.subs) || 0;
    const tok = tierTok[t] || 0;
    const perSub = t === 'family' || t === 'premium';
    const denom = perSub ? subs : users;
    const avgMonthly = denom > 0 && periodDays > 0 ? tok / denom / periodDays * 30 : null;
    const cap = Number(caps[t]) || 0;
    const pct = avgMonthly != null && cap > 0 ? avgMonthly / cap * 100 : null;
    const userCell = perSub ? `${fmtInt(subs)}구독(${fmtInt(users)}명)` : `${fmtInt(users)}명`;
    return `<tr><td>${TIER_NAMES[t]}</td><td>${userCell}</td><td>${fmtTok(tok)}</td>`
      + `<td>${avgMonthly == null ? '–' : fmtTok(Math.round(avgMonthly))}</td>`
      + `<td${pct != null && pct > 100 ? ' class="over"' : ''}>${pct == null ? '–' : Math.round(pct) + '%'}</td></tr>`;
  }).join('');

  // 기능별 바 — 토큰 내림차순, 최대값 대비 % 폭 (서버 조회 구간 기준: 일별 분해 없음)
  const feats = Object.entries(data.tokens?.byFeature || {})
    .map(([k, v]) => ({ key: k, users: Number(v?.users) || 0, tokens: Number(v?.tokens) || 0 }))
    .sort((x, y) => y.tokens - x.tokens);
  const maxF = Math.max(1, ...feats.map(f => f.tokens));
  const featHtml = !feats.length ? EMPTY_CHART : feats.map(f => `
    <div class="feat">
      <div class="fl">${FEATURE_NAMES[f.key] || esc(f.key)} · ${fmtInt(f.users)}명 · ${fmtTok(f.tokens)}</div>
      <div class="ftrack"><div class="ffill" style="width:${Math.max(2, Math.round(f.tokens / maxF * 100))}%"></div></div>
    </div>`).join('');

  const legend = items => `<div class="legend">${items.map(([c, l]) =>
    `<span><i style="background:${c}"></i>${l}</span>`).join('')}</div>`;
  const maxNote = statsUnit === 'day' ? '' : ' · 최대 일활성';
  document.getElementById('statsBody').innerHTML = `
    <div class="kpis">${kpis}</div>
    <div class="scard"><h2>가입 추이 (${UNIT_LABEL[statsUnit]})</h2>
      ${barLineChart(suRows2, 'count', 'cum')}
      ${suRows2.length ? legend([['#7FD6A4', '신규 (좌축)'], ['#35A866', '누적 (우축)']]) : ''}</div>
    <div class="scard"><h2>활성 사용자 추이 (${UNIT_LABEL[statsUnit]}${maxNote})</h2>
      ${twoLineChart(acRows, 'app', 'ai')}
      ${acRows.length ? legend([['#35A866', '접속 (실선)'], ['#43C67A', 'AI 사용 (점선)']]) : ''}</div>
    <div class="scard"><h2>AI 토큰 — 티어별 (${UNIT_LABEL[statsUnit]})</h2>
      <table class="tier"><thead><tr><th>티어</th><th>사용자</th><th>총 토큰</th><th>평균 월환산</th><th>캡 대비</th></tr></thead>
      <tbody>${tierRows}</tbody></table>
      ${stackedBarChart(tkRows)}
      ${tkRows.length ? legend(TIER_SEGS.map(s => [s.color, s.label])) : ''}</div>
    <div class="scard"><h2>기능별 AI 사용${statsPeriod === '30' ? ' (조회 구간: 최근 90일)' : ''}</h2>${featHtml}</div>`;
}

async function enter() {
  if (!await verifyAndLoad()) return; // 비관리자/실패 — 로그인 화면 유지
  document.getElementById('login').classList.add('hidden');
  document.getElementById('shell').classList.remove('hidden');
  document.getElementById('who').textContent = sessionStorage.getItem('adminEmail') || '';
  showView('stats'); // 첫 화면 = 대시보드 (사이드바 첫 메뉴와 일치)
}

if (token()) enter();
</script>
